<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个页面</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #1f6eeb;
        }
        button {
            background: #1f6eeb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌱 Hello, GitHub!</h1>
        <p>这是我用手机在 GitHub 上编辑的第一个文件</p>
        <button onclick="alert('你成功了！🎉')">点我试试</button>
    </div>
</body>
</html>
